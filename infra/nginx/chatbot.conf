# /etc/nginx/sites-available/chatbot
#
# Install:
#   sudo cp infra/nginx/chatbot.conf /etc/nginx/sites-available/chatbot
#   sudo ln -s /etc/nginx/sites-available/chatbot /etc/nginx/sites-enabled/chatbot
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL is handled by Cloudflare (set SSL/TLS mode to "Full (strict)").
# Nginx only listens on port 80 — Cloudflare encrypts the visitor connection.
#
# Rate limit zones — defined at http context level (include in nginx.conf if
# this file is loaded via sites-enabled, or move to /etc/nginx/nginx.conf).
# Placed here for reference; nginx will use the first definition it sees.
limit_req_zone $binary_remote_addr zone=widget_chat:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=120r/m;

# ─── API + widget.js ──────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.douglasgithuicreatives.tech;

    # Allow large file uploads (PDF, DOCX, TXT)
    client_max_body_size 25M;

    # Gzip for API responses
    gzip on;
    gzip_types text/plain application/json text/event-stream;
    gzip_min_length 1000;

    # Widget JS — served directly by Nginx, cached by Cloudflare
    location /static/ {
        alias /home/deploy/chatbot-platform/services/api/app/static/;
        expires 1d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # Uploaded files — internal only, not publicly browsable
    location /uploads/ {
        internal;
    }

    # Widget chat endpoint — lower rate limit (30 req/min per IP)
    location /api/v1/widget/chat {
        limit_req zone=widget_chat burst=5 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE streaming — must disable all buffering
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;
        proxy_connect_timeout     10s;
        chunked_transfer_encoding on;
    }

    # All other API endpoints
    location / {
        limit_req zone=api_general burst=30 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;
    add_header Permissions-Policy     "geolocation=(), microphone=()" always;
}

# ─── Admin dashboard (React SPA) ─────────────────────────────────────────────
server {
    listen 80;
    server_name app.douglasgithuicreatives.tech;

    root  /home/deploy/chatbot-platform/admin-dist;
    index index.html;

    # Gzip static assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # index.html — never cache so fresh deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # Hashed JS/CSS/font/image assets — cache aggressively (Vite adds content hash)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # All other routes — serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        "DENY"          always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "strict-origin"  always;
    add_header Permissions-Policy     "geolocation=(), microphone=()" always;
}

# ─── Root domain ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name douglasgithuicreatives.tech www.douglasgithuicreatives.tech;

    # Option A (default): redirect root domain → admin panel
    return 301 https://app.douglasgithuicreatives.tech$request_uri;

    # Option B: serve a static landing page instead.
    # Comment out the return line above and uncomment below:
    #
    # root  /home/deploy/chatbot-platform/landing-dist;
    # index index.html;
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }
}
