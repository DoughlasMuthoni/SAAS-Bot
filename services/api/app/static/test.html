<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Widget Test Page</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #f0f4f8; }
    h1 { color: #1a202c; }
    .status { margin-top: 20px; padding: 12px 16px; background: #fff; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
    #log { margin-top: 10px; font-family: monospace; font-size: 12px; color: #555; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Widget Test Page</h1>
  <p>This page tests the chatbot widget embed. You should see a chat bubble in the bottom-left corner.</p>
  <div class="status">
    <strong>Status:</strong>
    <div id="log">Loading...</div>
  </div>

  <script>
    const log = document.getElementById('log');
    function addLog(msg) { log.textContent += '\n' + new Date().toISOString().slice(11,19) + ' ' + msg; }

    // Monkey-patch fetch to observe widget config call
    const origFetch = window.fetch;
    window.fetch = function(...args) {
      const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || String(args[0]);
      addLog('FETCH → ' + url);
      return origFetch.apply(this, args).then(r => {
        addLog('FETCH ← ' + url + ' (' + r.status + ')');
        return r;
      }).catch(e => {
        addLog('FETCH ERR ' + url + ': ' + e.message);
        throw e;
      });
    };

    addLog('Page loaded, waiting for widget script...');
  </script>

  <!-- Widget script — same as in demo site -->
  <script src="/static/widget.js" data-bot="I35lvHLo5bYq7A2tPALm1FhmrFegGEhu"></script>

  <script>
    setTimeout(() => {
      const host = document.getElementById('chatbot-widget-host');
      if (host) {
        addLog('chatbot-widget-host found in DOM ✓');
        const shadow = host.shadowRoot;
        if (shadow) {
          addLog('Shadow DOM open ✓ — children: ' + shadow.children.length);
        } else {
          addLog('ERROR: No shadow root');
        }
      } else {
        addLog('ERROR: chatbot-widget-host not found in DOM');
      }
    }, 2000);
  </script>
</body>
</html>
